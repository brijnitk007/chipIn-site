<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0f1823"/>
      <stop offset="100%" stop-color="#1a2332"/>
    </linearGradient>
    <linearGradient id="iconGrad" x1="180" y1="80" x2="340" y2="300" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#2dd4bf"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="80" y1="400" x2="440" y2="400" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#2dd4bf"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect width="512" height="512" rx="96" fill="url(#bgGrad)"/>

  <!-- Subtle glow behind icon -->
  <circle cx="256" cy="210" r="120" fill="#2dd4bf" opacity="0.08"/>

  <!-- Lightning bolt (Zap) icon -->
  <path d="M224 100 L196 228 L248 228 L216 340 L320 196 L264 196 L296 100 Z"
        fill="url(#iconGrad)" stroke="none"/>

  <!-- Chip/split lines on sides -->
  <rect x="120" y="170" width="40" height="4" rx="2" fill="#2dd4bf" opacity="0.5"/>
  <rect x="120" y="190" width="28" height="4" rx="2" fill="#06b6d4" opacity="0.4"/>
  <rect x="120" y="210" width="36" height="4" rx="2" fill="#2dd4bf" opacity="0.3"/>

  <rect x="352" y="170" width="40" height="4" rx="2" fill="#06b6d4" opacity="0.5"/>
  <rect x="364" y="190" width="28" height="4" rx="2" fill="#2dd4bf" opacity="0.4"/>
  <rect x="356" y="210" width="36" height="4" rx="2" fill="#06b6d4" opacity="0.3"/>

  <!-- "ChipIn" text -->
  <text x="256" y="430" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="80" font-weight="800" letter-spacing="-2" fill="url(#textGrad)">ChipIn</text>

  <!-- Subtle tagline -->
  <text x="256" y="468" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="20" font-weight="500" fill="#94a3b8" letter-spacing="4">SPLIT · SEND · SECURE</text>
</svg>
